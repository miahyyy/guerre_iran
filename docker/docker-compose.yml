services:
  web:
    image: php:8.3-apache
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8090:80"
    volumes:
      - ../:/var/www/html
    depends_on:
      - mysql
    environment:
      - MYSQL_HOST=mysql

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: guerre_iran
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
